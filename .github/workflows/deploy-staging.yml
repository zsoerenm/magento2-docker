name: Deploy to Staging

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    env:
      DEPLOY_DIR: /opt/magento2
      SSH_OPTS: -o StrictHostKeyChecking=no -i /tmp/deploy_key
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH
        run: |
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Write environment and secrets
        env:
          ENV: staging
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          OPENSEARCH_PASSWORD: ${{ secrets.OPENSEARCH_PASSWORD }}
          STAGING_PASSWORD: ${{ secrets.STAGING_PASSWORD }}
        run: |
          DEPLOY_DIR=. ./infra/setup-env.sh

      - name: Sync repo to staging server
        run: |
          rsync -az --delete \
            -e "ssh $SSH_OPTS" \
            --exclude='.git' \
            --exclude='docker-compose.override.yml' \
            ./ root@${{ secrets.STAGING_HOST }}:$DEPLOY_DIR/

      - name: Verify Magento source
        run: |
          ssh $SSH_OPTS root@${{ secrets.STAGING_HOST }} \
            "test -f $DEPLOY_DIR/src/composer.json || { echo '❌ Magento source not found in src/'; exit 1; }"

      - name: Build Docker images
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GH_PAT }}"}}'
        run: |
          ssh $SSH_OPTS root@${{ secrets.STAGING_HOST }} \
            "cd $DEPLOY_DIR && docker compose build --build-arg COMPOSER_AUTH='$COMPOSER_AUTH'"

      - name: Deploy
        timeout-minutes: 60
        run: |
          ssh $SSH_OPTS root@${{ secrets.STAGING_HOST }} bash <<'EOF'
            cd /opt/magento2
            # Stop existing containers and remove old state for fresh install
            docker compose down -v 2>/dev/null || true

            docker compose up -d

            echo "Waiting for services to start (max 10 min)..."
            for i in $(seq 1 120); do
              # Check if PHP is running (not restarting)
              php_status=$(docker compose ps php --format json 2>/dev/null | head -1)
              if echo "$php_status" | grep -q '"running"'; then
                echo "✅ PHP container is running"
                docker compose ps
                exit 0
              fi
              if echo "$php_status" | grep -q '"exited"'; then
                echo "❌ PHP container exited"
                docker compose logs php --tail=50
                exit 1
              fi
              sleep 5
            done

            echo "⏰ Timeout waiting for services"
            docker compose ps
            docker compose logs php --tail=50
            exit 1
          EOF

      - name: Show PHP container logs
        if: always()
        run: |
          ssh $SSH_OPTS root@${{ secrets.STAGING_HOST }} \
            "cd /opt/magento2 && docker compose logs php --tail=100" 2>/dev/null || true
