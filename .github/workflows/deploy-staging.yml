name: Deploy to Staging

on:
  push:
    branches: [master]
    paths-ignore:
      - "infra/**"
      - "*.md"
      - "docs/**"
      - ".github/workflows/infra.yml"
  workflow_run:
    workflows: ["Infrastructure"]
    types: [completed]
  workflow_dispatch:

# Only one deploy at a time — never cancel a running deploy.
# setup:install can take 30+ min; interrupting it leaves the DB in a partial
# state and env.php without install/date, breaking all subsequent deploys.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    # Skip if triggered by a failed infrastructure run
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, staging]
    environment: staging
    env:
      DEPLOY_DIR: /opt/magento2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync repo to deploy directory
        run: |
          rsync -rl --delete --chmod=Du=rwx,Dgo=rx,Fu=rwx,Fog=rx \
            --exclude='.git' \
            --exclude='docker-compose.override.yml' \
            --exclude='.env' \
            --exclude='docker/secrets' \
            "$GITHUB_WORKSPACE/" "$DEPLOY_DIR/"

      - name: Write environment and secrets
        env:
          ENV: staging
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          OPENSEARCH_PASSWORD: ${{ secrets.OPENSEARCH_PASSWORD }}
          STAGING_PASSWORD: ${{ secrets.STAGING_PASSWORD }}
        run: cd "$DEPLOY_DIR" && "$GITHUB_WORKSPACE/infra/setup-env.sh"

      - name: Verify Magento source
        run: |
          if [ ! -f "$DEPLOY_DIR/src/composer.json" ]; then
            echo "❌ Magento source code not found in src/"
            echo "   Copy your Magento project into the src/ directory first."
            exit 1
          fi

      - name: Build Docker images
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GH_PAT }}"}}'
        working-directory: /opt/magento2
        run: |
          # PHP must be built first — nginx COPY --from references the PHP image for static assets
          docker compose build php --build-arg COMPOSER_AUTH="$COMPOSER_AUTH"
          docker compose build web varnish

      - name: Deploy
        working-directory: /opt/magento2
        timeout-minutes: 90
        run: |
          # Stop existing containers but keep volumes (database, media, etc.)
          # The PHP entrypoint handles both scenarios:
          # - Fresh install (no env.php): base entrypoint runs setup:install
          # - Existing install (env.php exists): prod entrypoint runs setup:upgrade
          docker compose down 2>/dev/null || true

          # Start all services
          docker compose up -d --wait-timeout 3600 || true

          # Wait for PHP to signal readiness (entrypoint creates this file
          # after setup:install/upgrade + di:compile + static-content:deploy)
          echo "Waiting for Magento setup to complete (up to 60 min)..."
          for i in $(seq 1 360); do
            if docker compose exec -T php test -f /tmp/magento-ready 2>/dev/null; then
              echo "✅ Magento is ready"
              docker compose ps
              exit 0
            fi
            # Check for fatal crashes (container exited and stays down)
            php_state=$(docker compose ps php --format '{{.State}}' 2>/dev/null)
            if [ "$php_state" = "exited" ]; then
              echo "❌ PHP container exited"
              docker compose logs php --tail=50
              exit 1
            fi
            sleep 10
          done

          echo "⏰ Timeout waiting for Magento setup"
          docker compose logs php --tail=50
          exit 1

      - name: Show PHP container logs
        if: always()
        working-directory: /opt/magento2
        run: docker compose logs php --tail=100
