name: Deploy to Staging

on:
  workflow_dispatch:
  # Uncomment the push trigger in your private repo to auto-deploy on push:
  # push:
  #   branches: [master]
  #   paths-ignore:
  #     - "infra/**"
  #     - "*.md"
  #     - "docs/**"
  #     - ".github/workflows/infra.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, staging]
    environment: staging
    env:
      DEPLOY_DIR: /opt/magento2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Write environment and secrets
        env:
          ENV: staging
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          OPENSEARCH_PASSWORD: ${{ secrets.OPENSEARCH_PASSWORD }}
          STAGING_PASSWORD: ${{ secrets.STAGING_PASSWORD }}
        run: ./infra/setup-env.sh

      - name: Sync repo to deploy directory
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='docker-compose.override.yml' \
            --exclude='.env' \
            --exclude='docker/secrets' \
            "$GITHUB_WORKSPACE/" "$DEPLOY_DIR/"

      - name: Verify Magento source
        run: |
          if [ ! -f "$DEPLOY_DIR/src/composer.json" ]; then
            echo "❌ Magento source code not found in src/"
            echo "   Copy your Magento project into the src/ directory first."
            exit 1
          fi

      - name: Build Docker images
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GH_PAT }}"}}'
        working-directory: /opt/magento2
        run: |
          # PHP must be built first — nginx COPY --from references the PHP image for static assets
          docker compose build php --build-arg COMPOSER_AUTH="$COMPOSER_AUTH"
          docker compose build web varnish

      - name: Deploy
        working-directory: /opt/magento2
        timeout-minutes: 60
        run: |
          # Stop existing containers and remove old state for fresh install
          docker compose down -v 2>/dev/null || true

          docker compose up -d

          echo "Waiting for services to start (max 10 min)..."
          for i in $(seq 1 120); do
            # Check if PHP is running (not restarting)
            php_status=$(docker compose ps php --format json 2>/dev/null | head -1)
            if echo "$php_status" | grep -q '"running"'; then
              echo "✅ PHP container is running"
              docker compose ps
              exit 0
            fi
            if echo "$php_status" | grep -q '"exited"'; then
              echo "❌ PHP container exited"
              docker compose logs php --tail=50
              exit 1
            fi
            sleep 5
          done

          echo "⏰ Timeout waiting for services"
          docker compose ps
          docker compose logs php --tail=50
          exit 1

      - name: Show PHP container logs
        if: always()
        working-directory: /opt/magento2
        run: docker compose logs php --tail=100
