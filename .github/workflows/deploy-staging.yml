name: Deploy to Staging

on:
  push:
    branches: [master]
    paths-ignore:
      - "infra/**"
      - "*.md"
      - "docs/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:

# Magento's setup:install and setup:upgrade require at least 8 GB RAM.
# CX23 (4 GB) is not enough — the PHP process gets killed mid-migration.
# We temporarily upgrade to a larger server type for the deploy, then
# downgrade back afterwards. The upgrade takes ~1-2 minutes and costs
# only a few cents (hourly billing).
env:
  DEPLOY_SERVER_TYPE: cx33
  NORMAL_SERVER_TYPE: cx23

jobs:
  upgrade-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for config.toml)
        uses: actions/checkout@v6
        with:
          sparse-checkout: infra/config.toml

      - name: Install hcloud
        run: |
          curl -sL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz | tar xz
          sudo mv hcloud /usr/local/bin/

      - name: Upgrade server
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          SERVER_NAME="magento2-$(python3 -c "
          import tomllib
          with open('infra/config.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['servers']['staging']['hostname'])
          ")"
          echo "SERVER_NAME=$SERVER_NAME" >> "$GITHUB_ENV"

          CURRENT_TYPE=$(hcloud server describe "$SERVER_NAME" -o json | jq -r '.server_type.name')
          echo "Current server type: $CURRENT_TYPE"

          if [ "$CURRENT_TYPE" != "$DEPLOY_SERVER_TYPE" ]; then
            echo "Upgrading $SERVER_NAME to $DEPLOY_SERVER_TYPE for deploy..."
            hcloud server shutdown "$SERVER_NAME" --poll-interval 5s
            sleep 10
            hcloud server change-type --keep-disk "$SERVER_NAME" "$DEPLOY_SERVER_TYPE"
            hcloud server poweron "$SERVER_NAME" --poll-interval 5s
            echo "Waiting for server and runner to come back..."
            sleep 60
            echo "✅ Server upgraded to $DEPLOY_SERVER_TYPE"
          else
            echo "Server already at $DEPLOY_SERVER_TYPE, skipping upgrade"
          fi

  deploy:
    needs: upgrade-server
    runs-on: [self-hosted, staging]
    environment: staging
    env:
      DEPLOY_DIR: /opt/magento2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync repo to deploy directory
        run: |
          rsync -rl --delete --chmod=Du=rwx,Dgo=rx,Fu=rw,Fog=r \
            --exclude='.git' \
            --exclude='docker-compose.override.yml' \
            --exclude='.env' \
            --exclude='docker/secrets' \
            "$GITHUB_WORKSPACE/" "$DEPLOY_DIR/"

      - name: Write environment and secrets
        env:
          ENV: staging
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          OPENSEARCH_PASSWORD: ${{ secrets.OPENSEARCH_PASSWORD }}
          STAGING_PASSWORD: ${{ secrets.STAGING_PASSWORD }}
        run: cd "$DEPLOY_DIR" && "$GITHUB_WORKSPACE/infra/setup-env.sh"

      - name: Verify Magento source
        run: |
          if [ ! -f "$DEPLOY_DIR/src/composer.json" ]; then
            echo "❌ Magento source code not found in src/"
            echo "   Copy your Magento project into the src/ directory first."
            exit 1
          fi

      - name: Build Docker images
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GH_PAT }}"}}'
        working-directory: /opt/magento2
        run: |
          # PHP must be built first — nginx COPY --from references the PHP image for static assets
          docker compose build php --build-arg COMPOSER_AUTH="$COMPOSER_AUTH"
          docker compose build web varnish

      - name: Deploy
        working-directory: /opt/magento2
        timeout-minutes: 60
        run: |
          # Stop existing containers and remove old state for fresh install
          docker compose down -v 2>/dev/null || true

          # Start infrastructure services first
          docker compose up -d db opensearch valkey

          echo "Waiting for database..."
          for i in $(seq 1 60); do
            if docker compose exec -T db healthcheck.sh --connect --innodb_initialized 2>/dev/null; then
              echo "✅ Database ready"
              break
            fi
            [ $i -eq 60 ] && echo "⏰ DB timeout" && docker compose logs db --tail=20 && exit 1
            sleep 5
          done

          # Start PHP (runs setup:install or setup:upgrade via entrypoint)
          docker compose up -d php

          echo "Waiting for Magento setup to complete..."
          for i in $(seq 1 120); do
            if docker compose exec -T php test -f /var/www/html/app/etc/env.php 2>/dev/null; then
              echo "✅ Magento env.php exists"
              break
            fi
            php_state=$(docker compose ps php --format '{{.State}}' 2>/dev/null)
            if [ "$php_state" = "exited" ]; then
              echo "❌ PHP container exited during setup"
              docker compose logs php --tail=100
              exit 1
            fi
            sleep 5
          done

          # Wait for PHP-FPM to be ready
          echo "Waiting for PHP-FPM..."
          for i in $(seq 1 120); do
            if docker compose exec -T php php-fpm -t 2>/dev/null; then
              echo "✅ PHP-FPM ready"
              break
            fi
            php_state=$(docker compose ps php --format '{{.State}}' 2>/dev/null)
            if [ "$php_state" = "exited" ] || [ "$php_state" = "restarting" ]; then
              echo "❌ PHP container in state: $php_state"
              docker compose logs php --tail=100
              exit 1
            fi
            sleep 5
          done

          # Start remaining services
          docker compose up -d

          echo "✅ All services started"
          docker compose ps

      - name: Show PHP container logs
        if: always()
        working-directory: /opt/magento2
        run: docker compose logs php --tail=100

  downgrade-server:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for config.toml)
        uses: actions/checkout@v6
        with:
          sparse-checkout: infra/config.toml

      - name: Install hcloud
        run: |
          curl -sL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz | tar xz
          sudo mv hcloud /usr/local/bin/

      - name: Downgrade server
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          SERVER_NAME="magento2-$(python3 -c "
          import tomllib
          with open('infra/config.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['servers']['staging']['hostname'])
          ")"

          CURRENT_TYPE=$(hcloud server describe "$SERVER_NAME" -o json | jq -r '.server_type.name')
          echo "Current server type: $CURRENT_TYPE"

          if [ "$CURRENT_TYPE" != "$NORMAL_SERVER_TYPE" ]; then
            echo "Downgrading $SERVER_NAME back to $NORMAL_SERVER_TYPE..."
            hcloud server shutdown "$SERVER_NAME" --poll-interval 5s
            sleep 10
            hcloud server change-type --keep-disk "$SERVER_NAME" "$NORMAL_SERVER_TYPE"
            hcloud server poweron "$SERVER_NAME" --poll-interval 5s
            echo "✅ Server downgraded to $NORMAL_SERVER_TYPE"
          else
            echo "Server already at $NORMAL_SERVER_TYPE"
          fi
